AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Parameters:
  DynamoDBTableName:
    Type: String
    Default: fish-tracker

Globals:
  Function:
    Runtime: python3.12
    Timeout: 300
    MemorySize: 512
    Environment:
      Variables:
        DYNAMODB_TABLE: !Ref DynamoDBTableName

Resources:
  FishDataPuller:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: fish-data-puller
      CodeUri: fish-data-puller-lambda/
      Handler: handler.lambda_handler
      Policies:
        - DynamoDBWritePolicy:
            TableName: !Ref DynamoDBTableName
      Events:
        DailySchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 5 * * ? *)   # 5 AM UTC daily, runs before the aggregator
            Description: Daily WDFW fish catch data pull into DynamoDB
            Enabled: true
