<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fish Tracker Heatmap</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="sidebar">
    <h2>Fish Tracker</h2>

    <label for="species-select">Species</label>
    <select id="species-select">
      <option value="chinook">Chinook per Angler</option>
      <option value="coho">Coho per Angler</option>
      <option value="pink">Pink per Angler</option>
    </select>

    <label for="week-slider">Week: <span id="week-label">—</span></label>
    <input type="range" id="week-slider" min="0" value="0" />

    <div id="playback">
      <button id="btn-play">▶ Play</button>
      <button id="btn-stop">■ Stop</button>
    </div>

    <div id="legend">
      <div class="legend-title">Fish / Angler</div>
      <div class="legend-scale"></div>
      <div class="legend-labels">
        <span>0</span><span id="legend-max">max</span>
      </div>
    </div>

    <div id="tooltip-box">
      <div id="tooltip-area">Hover an area</div>
      <div id="tooltip-stats"></div>
    </div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
