version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - pip install --upgrade aws-sam-cli

  build:
    commands:
      - sam build --template-file lambda/template.yaml

  post_build:
    commands:
      - |
        sam deploy \
          --no-confirm-changeset \
          --no-fail-on-empty-changeset \
          --stack-name fish-heatmap-aggregator \
          --s3-bucket $ARTIFACT_BUCKET \
          --capabilities CAPABILITY_IAM \
          --parameter-overrides \
              S3BucketName=$S3_BUCKET \
              DynamoDBTableName=$DYNAMODB_TABLE

artifacts:
  files:
    - "**/*"
