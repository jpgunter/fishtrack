version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - pip install --upgrade aws-sam-cli

  build:
    commands:
      - sam build --template-file fish-heatmap-lambda/template.yaml --build-dir .aws-sam/build-heatmap
      - sam build --template-file fish-data-puller-lambda/template.yaml --build-dir .aws-sam/build-puller

  post_build:
    commands:
      # Deploy the heatmap aggregator Lambda stack
      - |
        sam deploy \
          --no-confirm-changeset \
          --no-fail-on-empty-changeset \
          --stack-name fish-heatmap-aggregator \
          --s3-bucket $ARTIFACT_BUCKET \
          --capabilities CAPABILITY_IAM \
          --build-dir .aws-sam/build-heatmap \
          --parameter-overrides \
              S3BucketName=$S3_BUCKET \
              DynamoDBTableName=$DYNAMODB_TABLE
      # Deploy the data puller Lambda stack
      - |
        sam deploy \
          --no-confirm-changeset \
          --no-fail-on-empty-changeset \
          --stack-name fish-data-puller \
          --s3-bucket $ARTIFACT_BUCKET \
          --capabilities CAPABILITY_IAM \
          --build-dir .aws-sam/build-puller \
          --parameter-overrides \
              DynamoDBTableName=$DYNAMODB_TABLE
      # Self-update the pipeline stack
      - |
        aws cloudformation deploy \
          --no-fail-on-empty-changeset \
          --template-file pipeline/pipeline.yaml \
          --stack-name fishtrack-pipeline \
          --capabilities CAPABILITY_NAMED_IAM \
          --parameter-overrides \
              S3BucketName=$S3_BUCKET \
              ArtifactBucketName=$ARTIFACT_BUCKET

artifacts:
  files:
    - "**/*"
